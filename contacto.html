<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - Immobilia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header class="header">
        <div class="logo">
            <a href="index.html">
                <img src="Logos/Marca de Agua 3.png" alt="Logo">
            </a>
        </div>
        <div class="nombre">
            <h1>Immobilia</h1>
        </div>
        <nav class="menu">
            <a href="venta.html" class="btn">Compra</a>
            <a href="renta.html" class="btn">Renta</a>
            <a href="contacto.html" class="btn">Contacto</a>
        </nav>
    </header>

    <section style="padding: 60px 40px; max-width: 800px; margin: 0 auto;">
        <h2 style="color: #1f2c3a; font-size: 32px; margin-bottom: 20px;">Contáctanos</h2>
        <p style="color: #666; font-size: 18px; margin-bottom: 30px;">¿Tienes alguna pregunta? Estamos aquí para ayudarte.</p>
        
        <div style="background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 15px;">
                <i class="fas fa-phone" style="font-size: 28px; color: #caa45f;"></i>
                <div>
                    <h3 style="margin: 0 0 5px 0; color: #1f2c3a;">Teléfono</h3>
                    <p style="margin: 0; color: #666;">55 2333 2023 / 56 6759 9504</p>
                </div>
            </div>
            
            <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 15px;">
                <i class="fas fa-envelope" style="font-size: 28px; color: #caa45f;"></i>
                <div>
                    <h3 style="margin: 0 0 5px 0; color: #1f2c3a;">Email</h3>
                    <p style="margin: 0; color: #666;">immobiliabr@gmail.com</p>
                </div>
            </div>
            
            
            
            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee;">
                <h3 style="color: #1f2c3a; margin-bottom: 15px;">Horario de atención</h3>
                <p style="color: #666;">Lunes a Viernes: 9:00 AM - 7:00 PM</p>
                <p style="color: #666;">Sábados: 10:00 AM - 2:00 PM</p>
                <p style="color: #666;">Domingos: Cerrado</p>
            </div>
        </div>
    </section>

    <script src="JS Immobilia.js"></script>
</body>
</html>
