<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Propiedades en Venta - Immobilia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header class="header">
        <div class="logo">
            <a href="index.html">
                <img src="Logos/Marca de Agua 3.png" alt="Logo">
            </a>
        </div>
        <div class="nombre">
            <h1>Immobilia</h1>
        </div>
        <nav class="menu">
            <a href="venta.html" class="btn">Compra</a>
            <a href="renta.html" class="btn">Renta</a>
            <a href="contacto.html" class="btn">Contacto</a>
        </nav>
    </header>

    <section class="grid-propiedades">
        <!-- PROPIEDAD 1: BODEGA EN REMATE -->
        <a href="Bodega-(Remate).html" class="card">
            <img src="Terreno Comercial San Mateo Atenco/watermarked San Mateo 2.jpg" alt="Bodega en Remate">
            <div class="descripcion">
                <h3>Bodega (Remate)</h3>
                <h3>San Felipe Tlalmimilolpan</h3>
                <span class="precio">$8,500,000</span>
            </div>
            <div class="info-extra">
                <div class="item"><span class="icono">📐</span><span>1,114 m²</span></div>
                <div class="item"><span class="icono">🏗️</span><span>214 m²</span></div>
                <div class="item"><span class="icono">🛏️</span><span>3</span></div>
                <div class="item"><span class="icono">🚿</span><span>3</span></div>
                <div class="item"><span class="icono">🚗</span><span>1</span></div>
                <div class="item"><span class="icono">🏢</span><span>2</span></div>
            </div>
        </a>

        <!-- PROPIEDAD 2: CASA MODERNA (EJEMPLO) -->
        <a href="Casa Moderna.html" class="card">
            <img src="img/casa2.jpg" alt="Casa Moderna">
            <div class="descripcion">
                <h3>Casa Moderna</h3>
                <span class="precio">$3,200,000</span>
            </div>
            <div class="info-extra">
                <div class="item"><span class="icono">📐</span><span>250 m²</span></div>
                <div class="item"><span class="icono">🏗️</span><span>180 m²</span></div>
                <div class="item"><span class="icono">🛏️</span><span>4</span></div>
                <div class="item"><span class="icono">🚿</span><span>3</span></div>
                <div class="item"><span class="icono">🚗</span><span>2</span></div>
                <div class="item"><span class="icono">🏢</span><span>2</span></div>
            </div>
        </a>

        <!-- PROPIEDAD 3: DEPARTAMENTO CENTRICO (EJEMPLO) -->
        <a href="Departamento Centrico.html" class="card">
            <img src="img/casa3.jpg" alt="Departamento Céntrico">
            <div class="descripcion">
                <h3>Departamento Céntrico</h3>
                <span class="precio">$1,850,000</span>
            </div>
            <div class="info-extra">
                <div class="item"><span class="icono">📐</span><span>85 m²</span></div>
                <div class="item"><span class="icono">🏗️</span><span>85 m²</span></div>
                <div class="item"><span class="icono">🛏️</span><span>2</span></div>
                <div class="item"><span class="icono">🚿</span><span>2</span></div>
                <div class="item"><span class="icono">🚗</span><span>1</span></div>
                <div class="item"><span class="icono">🏢</span><span>1</span></div>
            </div>
        </a>
    </section>

    <script src="JS Immobilia.js"></script>
</body>
</html>
