<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Propiedades en Renta - Immobilia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header class="header">
        <div class="logo">
            <a href="index.html">
                <img src="Logos/Marca de Agua 3.png" alt="Logo">
            </a>
        </div>
        <div class="nombre">
            <h1>Immobilia</h1>
        </div>
        <nav class="menu">
            <a href="venta.html" class="btn">Compra</a>
            <a href="renta.html" class="btn">Renta</a>
            <a href="contacto.html" class="btn">Contacto</a>
        </nav>
    </header>

    <section class="grid-propiedades">
        <!-- PROPIEDAD 1: DEPARTAMENTO EN RENTA -->
        <a href="Departamento Renta.html" class="card">
            <img src="img/casa1.jpg" alt="Departamento en Renta">
            <div class="descripcion">
                <h3>Departamento Amueblado</h3>
                <span class="precio">$12,500/mes</span>
            </div>
            <div class="info-extra">
                <div class="item"><span class="icono">📐</span><span>75 m²</span></div>
                <div class="item"><span class="icono">🏗️</span><span>75 m²</span></div>
                <div class="item"><span class="icono">🛏️</span><span>2</span></div>
                <div class="item"><span class="icono">🚿</span><span>2</span></div>
                <div class="item"><span class="icono">🚗</span><span>1</span></div>
                <div class="item"><span class="icono">🏢</span><span>1</span></div>
            </div>
        </a>

        <!-- PROPIEDAD 2: CASA EN RENTA -->
        <a href="Casa Renta.html" class="card">
            <img src="img/casa2.jpg" alt="Casa en Renta">
            <div class="descripcion">
                <h3>Casa con Jardín</h3>
                <span class="precio">$18,000/mes</span>
            </div>
            <div class="info-extra">
                <div class="item"><span class="icono">📐</span><span>200 m²</span></div>
                <div class="item"><span class="icono">🏗️</span><span>150 m²</span></div>
                <div class="item"><span class="icono">🛏️</span><span>3</span></div>
                <div class="item"><span class="icono">🚿</span><span>2</span></div>
                <div class="item"><span class="icono">🚗</span><span>2</span></div>
                <div class="item"><span class="icono">🏢</span><span>2</span></div>
            </div>
        </a>
    </section>

    <script src="JS Immobilia.js"></script>
</body>
</html>
