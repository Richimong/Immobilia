<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Video</title>
    <style>
        /* Elimina cualquier margen, padding, fondo o decoración */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Solo el contenedor del video, sin nada extra */
        .video-wrapper {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <!-- ========================================== -->
        <!-- CAMBIA "mi-video.mp4" por el nombre real   -->
        <!-- de tu archivo de video                     -->
        <!-- ========================================== -->
        <video controls>
            <source src="postman.mp4" type="video/mp4">
            Tu navegador no soporta la reproducción de video.
        </video>
    </div>

</body>
</html>
